<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舒尔特方格 (Schulte Grid)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .schulte-grid {
            display: grid;
            gap: 5px;
            margin: 20px auto;
            max-width: 600px;
            justify-content: center;
            background: #333;
            padding: 5px;
            border-radius: 4px;
        }
        .schulte-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: #fff;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }
        .schulte-cell:active {
            background: #eee;
        }
        .schulte-cell.correct {
            background: #ddd;
            color: #aaa;
        }
        .schulte-cell.wrong {
            background: #ffcccc;
        }
        .schulte-cell.distractor {
            color: #555;
            background: #f4f4f4;
        }
        .schulte-cell.pace-late {
            outline: 3px solid #f0ad4e;
            outline-offset: -3px;
        }
        .training-setting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 12px;
            text-align: left;
        }
        .training-setting-grid label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.95rem;
        }
        .training-setting-grid select,
        .training-setting-grid input {
            min-height: 34px;
        }
        .result-details {
            margin: 12px 0;
            text-align: left;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="with-back-link">
            <a href="index.html" class="back-btn page-header-back"><span aria-hidden="true">←</span><span>返回主页</span></a>
            <h1>舒尔特方格</h1>
            <p>按目标序列进行视觉搜索与稳定扫描</p>
        </header>

        <div class="controls">
            <div class="settings-panel">
                <div class="mode-selection">
                    <label>
                        <input type="radio" name="game-mode" value="simple" checked> 简单版 (有提示)
                    </label>
                    <label>
                        <input type="radio" name="game-mode" value="advanced"> 高级版 (无提示)
                    </label>
                </div>
                <div class="number-setting">
                    <label for="grid-size">矩阵阶数 (N):</label>
                    <input type="number" id="grid-size" min="3" max="9" value="5">
                </div>
                <div class="training-setting-grid">
                    <label for="symbol-set">
                        目标集合
                        <select id="symbol-set">
                            <option value="numbers" selected>数字序列</option>
                            <option value="letters">字母序列</option>
                            <option value="symbols">符号序列</option>
                            <option value="mixed">数字/字母混合</option>
                        </select>
                    </label>
                    <label for="distractor-level">
                        干扰项
                        <select id="distractor-level">
                            <option value="none" selected>无干扰</option>
                            <option value="mild">轻度干扰</option>
                            <option value="strong">强干扰</option>
                        </select>
                    </label>
                    <label for="target-path">
                        目标路径
                        <select id="target-path">
                            <option value="random" selected>随机搜索</option>
                            <option value="row">行扫描</option>
                            <option value="snake">蛇形扫描</option>
                            <option value="spiral">螺旋扫描</option>
                        </select>
                    </label>
                    <label for="pace-mode">
                        节奏
                        <select id="pace-mode">
                            <option value="self" selected>自定节奏</option>
                            <option value="paced">目标节奏</option>
                            <option value="timed">限时回合</option>
                        </select>
                    </label>
                    <label for="pace-ms">
                        参考间隔(ms)
                        <input type="number" id="pace-ms" min="300" max="5000" step="50" value="1100">
                    </label>
                    <label for="time-limit">
                        限时(秒)
                        <input type="number" id="time-limit" min="10" max="300" step="5" value="60">
                    </label>
                </div>
            </div>
            <div class="info-panel">
                <div class="info-item">
                    <span class="label">目标:</span>
                    <span id="target-num" class="value">1</span>
                </div>
                <div class="info-item">
                    <span class="label">用时:</span>
                    <span id="timer" class="value">00:00</span>
                </div>
                <div class="info-item">
                    <span class="label">进度:</span>
                    <span id="progress" class="value">0/25</span>
                </div>
                <div class="info-item">
                    <span class="label">节奏:</span>
                    <span id="pace-status" class="value">自定</span>
                </div>
            </div>
            <button id="start-btn" class="btn primary">开始测试</button>
        </div>

        <div id="game-area" class="game-area" style="background: transparent; border: none; display: flex; align-items: center; justify-content: center; height: auto; min-height: 400px; padding-bottom: 0;">
            <div id="schulte-grid" class="schulte-grid"></div>
        </div>
        
        <div class="rules-section">
            <h3>评价标准 (5x5)</h3>
            <table>
                <tr>
                    <th>等级</th>
                    <th>用时范围</th>
                </tr>
                <tr><td>优秀</td><td>20秒以内</td></tr>
                <tr><td>良好</td><td>20 - 30秒</td></tr>
                <tr><td>中等</td><td>30 - 45秒</td></tr>
                <tr><td>一般</td><td>45 - 60秒</td></tr>
            </table>
        </div>
    </div>

    <!-- Modal for Result -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2>挑战成功！</h2>
            <p>你的用时: <span id="final-time"></span></p>
            <div id="result-details" class="result-details"></div>
            <button id="restart-btn" class="btn primary">确定</button>
        </div>
    </div>

    <script src="src/shared/seeded-random.js"></script>
    <script src="src/shared/training-results.js"></script>
    <script src="schulte.js"></script>
</body>
</html>
