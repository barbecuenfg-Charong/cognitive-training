<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日训练报告 - 认知能力训练</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>
    <style>
        .report-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }

        .report-controls input[type="date"] {
            padding: 8px 10px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 1rem;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .report-card {
            background: #f8f9fa;
            border: 1px solid #eef2f7;
            border-radius: 10px;
            padding: 14px;
        }

        .report-card .label {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .report-card .value {
            color: #2c3e50;
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 4px;
        }

        .report-table-wrap {
            overflow-x: auto;
        }

        .report-table {
            table-layout: fixed;
        }

        .report-table col.time-col {
            width: 18%;
        }

        .report-table col.game-col {
            width: 28%;
        }

        .report-table col.duration-col {
            width: 16%;
        }

        .report-table col.metrics-col {
            width: 38%;
        }

        .session-name {
            font-weight: 600;
        }

        .session-meta {
            color: #7f8c8d;
            font-size: 0.78rem;
            line-height: 1.3;
            margin-top: 2px;
            overflow-wrap: anywhere;
        }

        .metrics-cell {
            overflow-wrap: anywhere;
            white-space: normal;
        }

        #empty-hint {
            color: #7f8c8d;
            margin-top: 10px;
        }

        .training-feedback {
            border-top: 1px solid #eef2f7;
            margin: 22px 0 24px;
            padding-top: 18px;
        }

        .feedback-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .feedback-header h2 {
            color: #2c3e50;
            font-size: 1.25rem;
            margin: 0;
        }

        .feedback-window {
            color: #7f8c8d;
            font-size: 0.88rem;
        }

        .feedback-layout {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .feedback-panel {
            background: #ffffff;
            border: 1px solid #e8eef5;
            border-left: 4px solid #3498db;
            border-radius: 8px;
            padding: 14px;
        }

        .feedback-panel h3 {
            color: #34495e;
            font-size: 1rem;
            margin: 0 0 8px;
        }

        .feedback-panel p {
            color: #2c3e50;
            line-height: 1.55;
            margin: 0;
        }

        .feedback-panel.wide {
            grid-column: 1 / -1;
        }

        .feedback-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .feedback-list li {
            border-top: 1px solid #eef2f7;
            color: #2c3e50;
            line-height: 1.45;
            padding: 8px 0;
        }

        .feedback-list li:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .domain-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .domain-chip {
            background: #f8f9fa;
            border: 1px solid #e8eef5;
            border-radius: 999px;
            color: #34495e;
            font-size: 0.86rem;
            padding: 6px 10px;
        }

        .feedback-empty {
            color: #7f8c8d;
        }

        @media (max-width: 720px) {
            .feedback-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .feedback-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <a href="index.html" class="back-btn"><span aria-hidden="true">←</span><span>返回主页</span></a>
            <h1>每日训练报告</h1>
            <div class="score-board">
                <span><i class="fas fa-calendar-day"></i> 日期: <span id="selected-date-text">--</span></span>
            </div>
        </header>

        <div class="game-area">
            <div class="report-controls">
                <label for="date-picker">选择日期</label>
                <input id="date-picker" type="date">
                <button class="btn secondary" id="today-btn">今天</button>
                <button class="btn danger" id="clear-btn">清空所有记录</button>
            </div>

            <div class="report-grid">
                <div class="report-card">
                    <div class="label">训练场次</div>
                    <div class="value" id="total-sessions">0</div>
                </div>
                <div class="report-card">
                    <div class="label">训练项目数</div>
                    <div class="value" id="unique-games">0</div>
                </div>
                <div class="report-card">
                    <div class="label">总时长</div>
                    <div class="value" id="total-duration">0m</div>
                </div>
                <div class="report-card">
                    <div class="label">平均时长</div>
                    <div class="value" id="avg-duration">0m</div>
                </div>
            </div>

            <section class="training-feedback" aria-labelledby="training-feedback-title">
                <div class="feedback-header">
                    <h2 id="training-feedback-title">训练反馈</h2>
                    <span class="feedback-window" id="feedback-window">--</span>
                </div>
                <div class="feedback-layout">
                    <section class="feedback-panel" aria-labelledby="feedback-trend-title">
                        <h3 id="feedback-trend-title">最近训练趋势</h3>
                        <p id="feedback-trend" class="feedback-empty">暂无可用训练记录。</p>
                    </section>
                    <section class="feedback-panel" aria-labelledby="feedback-domains-title">
                        <h3 id="feedback-domains-title">能力域概览</h3>
                        <div id="domain-summary" class="domain-summary"></div>
                    </section>
                    <section class="feedback-panel" aria-labelledby="feedback-weakness-title">
                        <h3 id="feedback-weakness-title">弱项识别</h3>
                        <ul id="weakness-list" class="feedback-list"></ul>
                    </section>
                    <section class="feedback-panel" aria-labelledby="feedback-next-title">
                        <h3 id="feedback-next-title">下一轮建议</h3>
                        <ul id="next-round-list" class="feedback-list"></ul>
                    </section>
                    <section class="feedback-panel wide" aria-labelledby="feedback-recent-title">
                        <h3 id="feedback-recent-title">最近 5 次表现提示</h3>
                        <ul id="recent-hints-list" class="feedback-list"></ul>
                    </section>
                </div>
            </section>

            <div class="report-table-wrap">
                <table class="report-table">
                    <colgroup>
                        <col class="time-col">
                        <col class="game-col">
                        <col class="duration-col">
                        <col class="metrics-col">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>项目</th>
                            <th>时长</th>
                            <th>关键指标</th>
                        </tr>
                    </thead>
                    <tbody id="sessions-body"></tbody>
                </table>
            </div>
            <p id="empty-hint"></p>
        </div>
    </div>

    <script src="src/shared/training-results.js"></script>
    <script src="report.js"></script>
</body>
</html>
